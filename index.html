<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | Veld</title>

  <link rel="icon" type="image/png" href="assets/images/logo/favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


  <style>
    :root {
      --bg: #07070A;
      --text: #F5F5F7;
      --muted: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.08);
      --card: rgba(255,255,255,0.03);
      --radius: 22px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Montserrat", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    .wip {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px;
    }

    .wip::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("assets/images/backgrounds/gradient.webp") center/cover no-repeat;
      opacity: 0.35;
      z-index: 1;
    }

    .wip::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,0,0,0.25), rgba(0,0,0,0.95));
      z-index: 2;
    }

    .wip-box {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 760px;
      padding: 45px 40px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.65);
      text-align: left;
    }

    .wip-box h1 {
      font-size: 52px;
      line-height: 1.05;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }

    .wip-box p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .secret {
      margin-top: 25px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: rgba(255,255,255,0.7);
      margin-left: 6px;
      animation: blink 1s infinite;
      transform: translateY(3px);
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .wip-box {
        padding: 35px 26px;
      }

      .wip-box h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <section class="wip">
    <div class="wip-box">
      <h1>Work in Progress...</h1>

      <p>
        This site is currently being <b>handcrafted</b> by Veld.
      </p>

      <p>
        If you somehow ended up here… we’re a design & coding studio. This site isn’t ready yet, but will be soon. Come back later — it’ll be worth it.

      </p>

      <div class="secret">
        <span>VELD // website un-finished // return when complete</span>
        <span class="cursor"></span>
      </div>
    </div>
  </section>

</body>
</html>
