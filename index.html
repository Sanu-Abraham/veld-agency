<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | VELD</title>
  <meta name="description" content="This page is currently under construction. Veld is building something premium." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo/favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


  <!-- Global CSS -->
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />

  <style>
    .wip-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      padding: 30px;
      overflow: hidden;
    }

    .wip-page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("assets/images/backgrounds/gradient.webp") center/cover no-repeat;
      opacity: 0.35;
      z-index: 1;
    }

    .wip-page::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,0,0,0.25), rgba(0,0,0,0.95));
      z-index: 2;
    }

    .wip-noise {
      position: absolute;
      inset: 0;
      background: url("assets/images/backgrounds/noise.png");
      opacity: 0.04;
      z-index: 3;
      pointer-events: none;
    }

    .wip-box {
      position: relative;
      z-index: 4;
      width: 100%;
      max-width: 780px;
      padding: 50px 45px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.65);
      text-align: left;
    }

    .wip-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .wip-box h1 {
      font-size: 56px;
      line-height: 1.05;
      margin-bottom: 18px;
      letter-spacing: -1px;
    }

    .wip-box p {
      font-size: 15px;
      line-height: 1.8;
      max-width: 680px;
      margin-bottom: 14px;
    }

    .wip-note {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: rgba(255,255,255,0.7);
      margin-left: 6px;
      animation: blink 1s infinite;
      transform: translateY(3px);
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .wip-box {
        padding: 36px 26px;
      }

      .wip-box h1 {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <section class="wip-page">
    <div class="wip-noise"></div>

    <div class="wip-box">
      <div class="wip-label">YOU'RE EARLY!</div>

      <h1>Under Construction 🏗️</h1>

      <p>
        The site you wanted to visit is still being handcrafted by <b>VELD</b>
        </p>
      <p>
        If you somehow ended up here… we’re a design & coding studio. 
        </p>

      <p>
        This site isn’t ready yet, but will be soon. Come back later — it’ll be worth it.
      </p>

      <div class="wip-note">
        <span>VELD // building in silence // see you later! </span>
        <span class="cursor"></span>
      </div>
    </div>
  </section>

</body>
</html>
